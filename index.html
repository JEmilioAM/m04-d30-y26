<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de Tareas</title>

    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="main-container">
        <h2>Administrar Tareas.</h2>
        
    <form onsubmit="handleFormSubmit(event)">
        <input required type="text" placeholder="Titulo" name="title">
        <textarea placeholder="Agrega la descripcion de la tarea" name="description" rows="5"></textarea>

    </form>

    <ul id="task-list-container" class="task-list"></ul>

    </div>    

    <script src="./intro.js"></script>
</body>
