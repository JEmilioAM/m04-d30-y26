<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de Tareas</title>

    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="main-container">
        <h2>Administrar Tareas.</h2>
        
    <form onsubmit="handleFormSubmit(event)">
        <input 
            type="text" 
            placeholder="Titulo" 
            name="title" 
            required 
            minlength="6" 
        >
        <textarea 
            placeholder="Agregar una descripcion a la tarea" 
            name="description" 
            rows="5" 
            maxlength="30"
        ></textarea>
        <button type="submit">Agregar</button>
    </form>

    <ul id="task-list-container" class="task-list"></ul>

<div class="delete-section">
    <input 
        type="text" 
        id="delete-title" 
        placeholder="Titulo de la tarea a eliminar"
    >
    <button type="button" id="delete-by-title-btn">Eliminar por titulo</button>
</div>

    </div>

    <script src="./intro.js"></script>
</body>
</html>
